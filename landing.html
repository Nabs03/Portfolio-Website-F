<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Landing</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="dark-mode">
    <main>
        <section class="landing-page" aria-label="Portfolio Landing">
            <div class="landing-inner">
                <h1 class="landing-title">Noel Jr. B. Navarro</h1>
                <p class="landing-subtitle">BSIT Student • Web Developer • Portfolio</p>
                <p class="landing-cta-text">
                    Welcome! Explore my journey, posts, certifications, and skills.
                </p>

                <div class="landing-actions">
                    <a class="btn btn-primary" href="index.html">Enter Portfolio</a>
                </div>

                <div class="landing-badges" aria-label="Skills">
                    <div class="landing-badge">
                        <i class="fas fa-code" aria-hidden="true"></i> HTML • CSS • JavaScript
                    </div>
                    <div class="landing-badge">
                        <i class="fas fa-database" aria-hidden="true"></i> Database Management
                    </div>
                    <div class="landing-badge">
                        <i class="fas fa-layer-group" aria-hidden="true"></i> UI/UX Design
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
